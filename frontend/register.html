<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register - Job Portal</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav>
    <div class="brand">JobPortal</div>
    <div><a href="index.html">Home</a><a href="login.html">Login</a></div>
</nav>

<div class="container">
    <div class="card">
        <h2>Create an Account</h2>
        <form id="registerForm">
            <label>I am a:</label>
            <select id="role" required>
                <option value="candidate">Candidate</option>
                <option value="employer">Employer</option>
            </select>

            <input type="text" id="name" placeholder="Full Name" required>
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required minlength="6">
            <input type="text" id="phone" placeholder="Phone (optional)">
            <input type="text" id="company_name" placeholder="Company Name" style="display:none;">

            <button type="submit">Register</button>
            <p id="message"></p>
        </form>
        <p style="margin-top:10px;">Already have an account? <a href="login.html">Login here</a></p>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    const roleSelect = document.getElementById('role');
    const companyField = document.getElementById('company_name');
    roleSelect.addEventListener('change', () => {
        companyField.style.display = roleSelect.value === 'employer' ? 'block' : 'none';
        companyField.required = roleSelect.value === 'employer';
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const messageEl = document.getElementById('message');
        messageEl.textContent = '';

        const payload = {
            role: roleSelect.value,
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            phone: document.getElementById('phone').value,
            company_name: companyField.value
        };

        try {
            await apiRequest('/auth/register', 'POST', payload);
            messageEl.textContent = 'Registration successful! Redirecting to login...';
            messageEl.className = 'success';
            setTimeout(() => window.location.href = 'login.html', 1200);
        } catch (err) {
            messageEl.textContent = err.message;
            messageEl.className = 'error';
        }
    });
</script>
</body>
</html>
