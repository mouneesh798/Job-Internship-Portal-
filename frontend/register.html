<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - JobPortal</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
    <div class="brand">JobPortal</div>
    <div><a href="index.html">Home</a><a href="login.html">Login</a></div>
</nav>

<div class="container">
    <div class="card auth-card">
        <h2>Create Account</h2>
        <p class="subtitle">Join thousands of job seekers and employers</p>
        <form id="registerForm">
            <div>
                <label for="role">I am a</label>
                <select id="role" required style="width:100%;">
                    <option value="candidate">Job Seeker</option>
                    <option value="employer">Employer / Company</option>
                </select>
            </div>
            <div>
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="John Doe" required style="width:100%;">
            </div>
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" required style="width:100%;">
            </div>
            <div>
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Min 6 characters" required minlength="6" style="width:100%;">
            </div>
            <div>
                <label for="phone">Phone <span style="font-weight:400; color:var(--gray-400);">(optional)</span></label>
                <input type="text" id="phone" placeholder="+1 234 567 890" style="width:100%;">
            </div>
            <div id="companyField" style="display:none;">
                <label for="company_name">Company Name</label>
                <input type="text" id="company_name" placeholder="Acme Corp" style="width:100%;">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:14px; margin-top:4px;">Create Account</button>
            <div id="message" style="min-height:24px;"></div>
        </form>
        <p style="margin-top:16px; text-align:center; color:var(--gray-500); font-size:0.9rem;">
            Already registered? <a href="login.html" style="color:var(--primary); font-weight:600;">Sign in</a>
        </p>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    const roleSelect = document.getElementById('role');
    const companyField = document.getElementById('companyField');
    const companyInput = document.getElementById('company_name');

    roleSelect.addEventListener('change', () => {
        const isEmployer = roleSelect.value === 'employer';
        companyField.style.display = isEmployer ? 'block' : 'none';
        companyInput.required = isEmployer;
    });

    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const messageEl = document.getElementById('message');
        messageEl.innerHTML = '';

        const payload = {
            role: roleSelect.value,
            name: document.getElementById('name').value,
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
            phone: document.getElementById('phone').value,
            company_name: companyInput.value
        };

        try {
            await apiRequest('/auth/register', 'POST', payload);
            messageEl.innerHTML = '<div class="message message-success">Account created! Redirecting to login...</div>';
            setTimeout(() => window.location.href = 'login.html', 1200);
        } catch (err) {
            messageEl.innerHTML = `<div class="message message-error">${err.message}</div>`;
        }
    });
</script>
</body>
</html>
