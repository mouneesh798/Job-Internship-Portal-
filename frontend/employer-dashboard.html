<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Employer Dashboard - JobPortal</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
    <div class="brand">JobPortal</div>
    <div><a href="index.html">Browse</a><a href="#" onclick="logout()">Logout</a></div>
</nav>

<div class="container">
    <div class="dashboard-header">
        <div>
            <h1 id="welcomeMsg">Employer Dashboard</h1>
            <p style="color:var(--gray-500); font-size:0.9rem;">Manage your job postings and review applicants</p>
        </div>
    </div>

    <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
            <h4>Active Listings</h4>
            <div class="number" id="totalActive">-</div>
        </div>
        <div class="stat-card">
            <h4>Total Applicants</h4>
            <div class="number" id="totalApplicants" style="color:var(--primary);">-</div>
        </div>
        <div class="stat-card">
            <h4>Shortlisted</h4>
            <div class="number" id="totalShortlisted" style="color:var(--warning);">-</div>
        </div>
        <div class="stat-card">
            <h4>Selected</h4>
            <div class="number" id="totalSelected" style="color:var(--success);">-</div>
        </div>
    </div>

    <div class="card" style="border: 2px solid var(--primary-light);">
        <h2 style="display:flex; align-items:center; gap:8px; margin-bottom:20px;">
            <span style="font-size:1.2rem;">✏️</span> Post a New Job / Internship
        </h2>
        <form id="jobForm">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
                <div style="grid-column:1/-1;">
                    <label for="title">Job Title</label>
                    <input type="text" id="title" placeholder="e.g. Software Engineer Intern" required style="width:100%;">
                </div>
                <div>
                    <label for="type">Type</label>
                    <select id="type" style="width:100%;">
                        <option value="job">Job</option>
                        <option value="internship">Internship</option>
                    </select>
                </div>
                <div>
                    <label for="location">Location</label>
                    <input type="text" id="location" placeholder="New York, NY" style="width:100%;">
                </div>
                <div>
                    <label for="stipend_salary">Salary / Stipend</label>
                    <input type="text" id="stipend_salary" placeholder="$80,000 - $100,000" style="width:100%;">
                </div>
                <div>
                    <label for="skills_required">Skills</label>
                    <input type="text" id="skills_required" placeholder="React, Node.js, SQL" style="width:100%;">
                </div>
                <div style="grid-column:1/-1;">
                    <label for="description">Description</label>
                    <textarea id="description" placeholder="Describe the role, responsibilities, and requirements..." required></textarea>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="align-self:flex-start; margin-top:4px;">
                Post Opening →
            </button>
            <div id="jobMessage" style="min-height:24px;"></div>
        </form>
    </div>

    <div class="card">
        <div class="card-header">
            <h2>My Job Postings</h2>
        </div>
        <div id="myJobsList">
            <div style="text-align:center; padding:40px; color:var(--gray-400);">Loading...</div>
        </div>
    </div>

    <div class="card" id="applicantsSection" style="display:none; border: 2px solid #dbeafe;">
        <div class="card-header">
            <h2 id="applicantsTitle">Applicants</h2>
            <button class="btn btn-secondary btn-sm" onclick="document.getElementById('applicantsSection').style.display='none'" style="color:var(--gray-600);">Close</button>
        </div>
        <div style="overflow-x:auto;">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Resume</th>
                        <th>Status</th>
                        <th>Update</th>
                    </tr>
                </thead>
                <tbody id="applicantsBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    const user = requireAuth('employer');
    if (user) document.getElementById('welcomeMsg').textContent = `Welcome, ${user.company_name || user.name}`;

    document.getElementById('jobForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const messageEl = document.getElementById('jobMessage');
        messageEl.innerHTML = '';
        try {
            await apiRequest('/jobs', 'POST', {
                title: document.getElementById('title').value,
                type: document.getElementById('type').value,
                location: document.getElementById('location').value,
                stipend_salary: document.getElementById('stipend_salary').value,
                skills_required: document.getElementById('skills_required').value,
                description: document.getElementById('description').value
            }, true);
            messageEl.innerHTML = '<div class="message message-success">Job posted successfully!</div>';
            document.getElementById('jobForm').reset();
            loadMyJobs();
        } catch (err) {
            messageEl.innerHTML = `<div class="message message-error">${err.message}</div>`;
        }
    });

    async function loadMyJobs() {
        const listEl = document.getElementById('myJobsList');
        try {
            const jobs = await apiRequest('/jobs/employer/mine', 'GET', null, true);

            const activeJobs = jobs.filter(j => j.status === 'open');
            document.getElementById('totalActive').textContent = activeJobs.length;

            if (jobs.length === 0) {
                listEl.innerHTML = '<div style="text-align:center; padding:40px; color:var(--gray-400);">No jobs posted yet. Use the form above to create your first listing.</div>';
                return;
            }

            // Load applicants count for stats
            let totalApps = 0, shortlisted = 0, selected = 0;
            for (const job of jobs) {
                try {
                    const apps = await apiRequest(`/applications/job/${job.id}`, 'GET', null, true);
                    totalApps += apps.length;
                    shortlisted += apps.filter(a => a.status === 'Shortlisted').length;
                    selected += apps.filter(a => a.status === 'Selected').length;
                } catch(e) {}
            }
            document.getElementById('totalApplicants').textContent = totalApps;
            document.getElementById('totalShortlisted').textContent = shortlisted;
            document.getElementById('totalSelected').textContent = selected;

            listEl.innerHTML = jobs.map(job => `
                <div class="job-item">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:8px;">
                        <div>
                            <h3 style="margin-bottom:4px;">${job.title}</h3>
                            <div style="color:var(--gray-500); font-size:0.85rem;">${job.location || 'Remote'} ${job.stipend_salary ? '• ' + job.stipend_salary : ''}</div>
                        </div>
                        <div class="tags">
                            <span class="tag ${job.type === 'internship' ? 'tag-internship' : 'tag-job'}">${job.type}</span>
                            <span class="tag ${job.status === 'open' ? 'tag-open' : 'tag-closed'}">${job.status}</span>
                        </div>
                    </div>
                    <div style="margin-top:12px; display:flex; gap:8px; flex-wrap:wrap;">
                        <button class="btn btn-primary btn-sm" onclick="viewApplicants(${job.id}, '${job.title.replace(/'/g, "\\'")}')">👥 View Applicants</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteJob(${job.id})">Delete</button>
                    </div>
                </div>
            `).join('');
        } catch (err) {
            listEl.innerHTML = `<div class="message message-error">${err.message}</div>`;
        }
    }

    async function deleteJob(id) {
        if (!confirm('Are you sure you want to delete this job posting?')) return;
        try {
            await apiRequest(`/jobs/${id}`, 'DELETE', null, true);
            loadMyJobs();
        } catch (err) {
            alert(err.message);
        }
    }

    async function viewApplicants(jobId, title) {
        const section = document.getElementById('applicantsSection');
        const body = document.getElementById('applicantsBody');
        document.getElementById('applicantsTitle').textContent = `👥 Applicants for: ${title}`;
        section.style.display = 'block';
        body.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:30px; color:var(--gray-400);">Loading...</td></tr>';

        try {
            const applicants = await apiRequest(`/applications/job/${jobId}`, 'GET', null, true);
            if (applicants.length === 0) {
                body.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:30px; color:var(--gray-400);">No applicants yet.</td></tr>';
                return;
            }
            body.innerHTML = applicants.map(a => `
                <tr>
                    <td><strong>${a.name}</strong></td>
                    <td>${a.email}</td>
                    <td><a href="http://localhost:5000${a.resume_path}" target="_blank" class="btn btn-secondary btn-sm" style="color:var(--primary);">View</a></td>
                    <td><span class="status-${a.status}">${a.status}</span></td>
                    <td>
                        <select onchange="updateStatus(${a.application_id}, this.value)" style="padding:6px 10px; border-radius:6px; border:1px solid var(--gray-200); font-size:0.8rem;">
                            <option value="Applied" ${a.status === 'Applied' ? 'selected' : ''}>Applied</option>
                            <option value="Shortlisted" ${a.status === 'Shortlisted' ? 'selected' : ''}>Shortlisted</option>
                            <option value="Selected" ${a.status === 'Selected' ? 'selected' : ''}>Selected</option>
                            <option value="Rejected" ${a.status === 'Rejected' ? 'selected' : ''}>Rejected</option>
                        </select>
                    </td>
                </tr>
            `).join('');
        } catch (err) {
            body.innerHTML = `<tr><td colspan="5" class="message message-error" style="text-align:center;">${err.message}</td></tr>`;
        }
    }

    async function updateStatus(applicationId, status) {
        try {
            await apiRequest(`/applications/${applicationId}/status`, 'PUT', { status }, true);
        } catch (err) {
            alert(err.message);
        }
    }

    if (user) loadMyJobs();
</script>
</body>
</html>
