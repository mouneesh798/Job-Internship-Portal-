<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login - Job Portal</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav>
    <div class="brand">JobPortal</div>
    <div><a href="index.html">Home</a><a href="register.html">Register</a></div>
</nav>

<div class="container">
    <div class="card">
        <h2>Login</h2>
        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
            <p id="message"></p>
        </form>
        <p style="margin-top:10px;">No account? <a href="register.html">Register here</a></p>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const messageEl = document.getElementById('message');
        messageEl.textContent = '';

        try {
            const data = await apiRequest('/auth/login', 'POST', {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            });

            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));

            window.location.href = data.user.role === 'employer'
                ? 'employer-dashboard.html'
                : 'candidate-dashboard.html';
        } catch (err) {
            messageEl.textContent = err.message;
            messageEl.className = 'error';
        }
    });
</script>
</body>
</html>
