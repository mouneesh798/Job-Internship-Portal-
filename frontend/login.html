<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - JobPortal</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav>
    <div class="brand">JobPortal</div>
    <div><a href="index.html">Home</a><a href="register.html">Register</a></div>
</nav>

<div class="container">
    <div class="card auth-card">
        <h2>Welcome Back</h2>
        <p class="subtitle">Sign in to continue your job search</p>
        <form id="loginForm">
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" placeholder="you@example.com" required style="width:100%;">
            </div>
            <div>
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter your password" required style="width:100%;">
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%; justify-content:center; padding:14px;">Sign In</button>
            <div id="message" style="min-height:24px;"></div>
        </form>
        <p style="margin-top:16px; text-align:center; color:var(--gray-500); font-size:0.9rem;">
            Don't have an account? <a href="register.html" style="color:var(--primary); font-weight:600;">Create one</a>
        </p>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const messageEl = document.getElementById('message');
        messageEl.innerHTML = '';

        try {
            const data = await apiRequest('/auth/login', 'POST', {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value
            });

            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));

            window.location.href = data.user.role === 'employer'
                ? 'employer-dashboard.html'
                : 'candidate-dashboard.html';
        } catch (err) {
            messageEl.innerHTML = `<div class="message message-error">${err.message}</div>`;
        }
    });
</script>
</body>
</html>
